# Render Blueprint — deploys both frontend (static) + backend (web service)
# Docs: https://render.com/docs/blueprint-spec

services:
  # ─── Backend: Express + MongoDB + Groq ───────────────────────────────────
  - type: web
    name: ecotrack-ai-backend
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false   # Set manually in Render dashboard
      - key: GROQ_API_KEY
        sync: false   # Set manually in Render dashboard
      - key: JWT_SECRET
        sync: false   # Set manually in Render dashboard
      - key: FRONTEND_URL
        sync: false   # e.g. https://ecotrack-ai.vercel.app

  # ─── Frontend: React/Vite static site ────────────────────────────────────
  - type: web
    name: ecotrack-ai-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false   # e.g. https://ecotrack-ai-backend.onrender.com/api
